name: mantle

# Mantle full stack: postgres + minio + web + workers.
# For local dev, prefer `pnpm up` (uses docker-compose.dev.yml — infra only,
# app in native Node for hot-reload). This file is for prod-shaped deploys
# where everything runs in containers.
#
# Status: web and workers services pending — Dockerfiles still to be written.
# For now this file just brings up infra, same as docker-compose.dev.yml.

volumes:
  mantle_pg_data:
  mantle_minio_data:

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: mantle_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - mantle_pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: mantle_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio12345}
    volumes:
      - mantle_minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

